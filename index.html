<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control de Despegue</title>
    <style>
        body { background: #1a1a1a; color: #00d4ff; font-family: 'Courier New', monospace; text-align: center; }
        .panel { border: 4px solid #333; display: inline-block; padding: 20px; border-radius: 10px; background: #222; }
        .pantalla { background: #000; padding: 10px; border: 1px solid #00d4ff; margin-bottom: 20px; min-width: 300px; }
        button { padding: 15px; font-weight: bold; cursor: pointer; margin: 10px; }
        #btn-despegue { background: #444; color: #888; border: none; }
        .activado { background: #ff4757 !important; color: white !important; box-shadow: 0 0 15px #ff4757; }
    </style>
</head>
<body>
    <div class="panel">
        <h1>SISTEMA DE DESPEGUE</h1>
        <div class="pantalla">
            <p>COMANDANTE: <span id="nombre-id">---</span></p>
            <p>ESTADO DE MOTORES: <span id="estado-motores">APAGADOS</span></p>
            <p>DESTINO ACTUAL: <span id="destino-id">---</span></p>
        </div>
        
        <button id="btn-identificar">IDENTIFICAR COMANDANTE</button>
        <button id="btn-motores">INICIAR MOTORES</button>
        <button id="btn-despegue">¡DESPEGAR!</button>
    </div>

    <script src="comandante.js"></script>
    <script src="propulsion.js"></script>
</body>
</html>
